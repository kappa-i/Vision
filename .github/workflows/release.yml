name: Release
# Déclenchement MANUEL uniquement (onglet Actions → "Release" → "Run workflow").
# Les pushes ne lancent plus de build : on évite de produire une release à
# chaque commit pendant le développement.
# Pour relancer les builds automatiques sur push, décommenter le bloc ci-dessous.
on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #     - master
  #   paths-ignore:
  #     - '**/*.md'
  #     - 'vision/docs/**'

permissions:
  contents: write

jobs:
  # 1. Crée UNE seule release (brouillon) en amont. Évite la race condition
  #    où les jobs Windows et macOS créaient chacun leur propre release.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Lire la version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./vision/src-tauri/tauri.conf.json').version")" >> "$GITHUB_OUTPUT"

      - name: Créer la release (brouillon)
        id: create
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const tag = `app-v${process.env.VERSION}`;
            const body = [
              '## Installation',
              '',
              '### Windows',
              'Télécharger et lancer le fichier `.exe` ou `.msi`.',
              '',
              '### macOS',
              '1. Télécharger le fichier `.dmg` ci-dessous.',
              '2. Ouvrir le DMG et glisser **vision** dans le dossier **Applications**.',
              '3. L\'app n\'étant pas notarisée par Apple, macOS affichera « vision est endommagé ». Pour débloquer, ouvrir le **Terminal** et coller :',
              '   ```',
              '   xattr -d com.apple.quarantine /Applications/vision.app',
              '   ```',
              '4. Lancer l\'app depuis le dossier Applications.',
            ].join('\n');

            let release;
            try {
              release = (await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Vision App v${process.env.VERSION}`,
                body,
                draft: true,
                prerelease: false,
              })).data;
            } catch (e) {
              // Re-run sur une version déjà créée : on réutilise la release existante
              // (getReleaseByTag ignore les brouillons, d'où la recherche dans la liste).
              if (e.status === 422) {
                const releases = await github.paginate(github.rest.repos.listReleases, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                });
                release = releases.find((r) => r.tag_name === tag);
                if (!release) throw e;
              } else {
                throw e;
              }
            }
            core.setOutput('release_id', release.id);

  # 2. Build chaque plateforme et attache les binaires à la release créée.
  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Create .env.local file
        working-directory: ./vision
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        shell: bash
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "$ENV_FILE" > .env.local
          fi

      - name: Install frontend dependencies
        working-directory: ./vision
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature/notarisation Apple : quand tu auras un compte Apple Developer,
          # ajoute ici les env APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          # APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          # (ne PAS les ajouter tant que les secrets n'existent pas : une valeur
          # vide fait échouer le codesign du build macOS).
        with:
          projectPath: ./vision
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
