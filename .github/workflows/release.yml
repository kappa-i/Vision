name: Release
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Create .env.local file
        working-directory: ./vision
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "$ENV_FILE" > .env.local
          fi
        shell: bash

      - name: Install frontend dependencies
        working-directory: ./vision
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature/notarisation Apple : quand tu auras un compte Apple Developer,
          # ajoute ici les env APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          # APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          # (ne PAS les ajouter tant que les secrets n'existent pas : une valeur
          # vide fait échouer le codesign du build macOS).
        with:
          projectPath: ./vision
          args: ${{ matrix.args }}
          tagName: app-v__VERSION__
          releaseName: 'Vision App v__VERSION__'
          releaseBody: |
            ## Installation

            ### Windows
            Télécharger et lancer le fichier `.exe` ou `.msi`.

            ### macOS
            1. Télécharger le fichier `.dmg` ci-dessous.
            2. Ouvrir le DMG et glisser **vision** dans le dossier **Applications**.
            3. L'app n'étant pas encore notarisée par Apple, macOS affichera « vision est endommagé ». Pour débloquer, ouvrir le **Terminal** et coller :
               ```
               xattr -d com.apple.quarantine /Applications/vision.app
               ```
            4. Lancer l'app depuis le dossier Applications.
          releaseDraft: true
          prerelease: false
